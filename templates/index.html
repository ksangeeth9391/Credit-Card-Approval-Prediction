<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="background"></div>

<div class="main-container">

    <div class="left-panel">

        <div class="logo">
            <i class="fa-solid fa-credit-card"></i>
        </div>

        <h1>Credit Card Approval Prediction</h1>

        <p>
            AI Powered Machine Learning System for evaluating
            customer eligibility for credit card approval.
        </p>

        <div class="features">

            <div class="feature">
                <i class="fa-solid fa-shield-halved"></i>
                Secure Prediction
            </div>

            <div class="feature">
                <i class="fa-solid fa-bolt"></i>
                Instant Results
            </div>

            <div class="feature">
                <i class="fa-solid fa-chart-line"></i>
                Machine Learning
            </div>

        </div>

    </div>

    <div class="right-panel">

        <div class="card">

            <h2>Applicant Information</h2>

            <form action="/predict" method="POST">

                <div class="grid">

                    <div>
                        <label>Gender</label>
                        <select name="CODE_GENDER">
                            {% for item in dropdowns["CODE_GENDER"] %}
                            <option value="{{item}}">{{item}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Own Car</label>
                        <select name="FLAG_OWN_CAR">
                            {% for item in dropdowns["FLAG_OWN_CAR"] %}
                            <option value="{{item}}">{{item}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Own House</label>
                        <select name="FLAG_OWN_REALTY">
                            {% for item in dropdowns["FLAG_OWN_REALTY"] %}
                            <option value="{{item}}">{{item}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Children</label>
                        <input type="number" name="CNT_CHILDREN" required>
                    </div>

                    <div>
                        <label>Annual Income</label>
                        <input type="number" name="AMT_INCOME_TOTAL" required>
                    </div>

                    <div>
                        <label>Income Type</label>
                        <select name="NAME_INCOME_TYPE">
                            {% for item in dropdowns["NAME_INCOME_TYPE"] %}
                            <option value="{{item}}">{{item}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Education</label>
                        <select name="NAME_EDUCATION_TYPE">
                            {% for item in dropdowns["NAME_EDUCATION_TYPE"] %}
                            <option value="{{item}}">{{item}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Family Status</label>
                        <select name="NAME_FAMILY_STATUS">
                            {% for item in dropdowns["NAME_FAMILY_STATUS"] %}
                            <option value="{{item}}">{{item}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Housing Type</label>
                        <select name="NAME_HOUSING_TYPE">
                            {% for item in dropdowns["NAME_HOUSING_TYPE"] %}
                            <option value="{{item}}">{{item}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Age</label>
                        <input type="number" name="AGE" required>
                    </div>

                    <div>
                        <label>Employment Years</label>
                        <input type="number" name="EMPLOYMENT_YEARS" required>
                    </div>

                    <div>
                        <label>Family Members</label>
                        <input type="number" step="0.1" name="CNT_FAM_MEMBERS" required>
                    </div>

                    <div>
                        <label>Occupation</label>
                        <select name="OCCUPATION_TYPE">
                            {% for item in dropdowns["OCCUPATION_TYPE"] %}
                            <option value="{{item}}">{{item}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label>Work Phone</label>
                        <input type="number" name="FLAG_WORK_PHONE" value="0">
                    </div>

                    <div>
                        <label>Phone</label>
                        <input type="number" name="FLAG_PHONE" value="0">
                    </div>

                    <div>
                        <label>Email</label>
                        <input type="number" name="FLAG_EMAIL" value="0">
                    </div>

                </div>

                <input type="hidden" name="FLAG_MOBIL" value="1">

                <button type="submit" class="predict-btn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    Predict Approval
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
